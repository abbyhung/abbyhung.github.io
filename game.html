        `);

        }

            m1Buy: { box: {x: 1900, y: 320, w: 160, h: 40}, title: '去皮剖木機', costs: [300, 700, 1500, 3000], count: 0, max: 4, cd: 0, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { machines1.push({x: 1900, y: 460 + this.count * 120, w: 100, h: 60, inCount: 0, outCount: 0, timer: 0}); this.count++; } },
            m1Speed: { box: {x: 1900, y: 370, w: 160, h: 40}, title: '去皮效率 (-1s)', costVal: 300, level: 1, maxTime: 6.0, cd: 0, hidden: function() { return upgrades.m1Buy.count === 0; }, req: function() { return this.level < 5; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (Lv.${this.level})` : '滿等'; }, action: function() { this.level++; this.maxTime -= 1.0; this.costVal = Math.floor(this.costVal * 1.8); } },

            transD: { box: {x: 1500, y: 370, w: 140, h: 40}, title: '運D (賣木材)', costs: [100, 300, 800], count: 0, max: 3, cd: 0, hidden: function() { return upgrades.m1Buy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transD.push({x: zoneLumber.x + 60, y: zoneLumber.y + 40, carry: 0, state: 'idle'}); } },
            transE: { box: {x: 1500, y: 420, w: 140, h: 40}, title: '運E (送木板機)', costs: [100, 300, 800], count: 0, max: 3, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transE.push({x: zoneLumber.x + 60, y: zoneLumber.y + 40, carry: 0, state: 'idle'}); } },

            m2Buy: { box: {x: 1100, y: 320, w: 160, h: 40}, title: '木板切割機 (1換3)', costs: [1000, 2500, 5000, 10000], count: 0, max: 4, cd: 0, hidden: function() { return upgrades.m1Buy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { machines2.push({x: 1100, y: 460 + this.count * 120, w: 100, h: 60, inCount: 0, outCount: 0, timer: 0}); this.count++; } },
            m2Speed: { box: {x: 1100, y: 370, w: 160, h: 40}, title: '切割效率 (-1s)', costVal: 1000, level: 1, maxTime: 6.0, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return this.level < 5; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (Lv.${this.level})` : '滿等'; }, action: function() { this.level++; this.maxTime -= 1.0; this.costVal = Math.floor(this.costVal * 1.8); } },

            // 木板物流 (獨立)
            transF: { box: {x: 700, y: 320, w: 140, h: 40}, title: '運F (收木板)', costs: [200, 600, 1500], count: 0, max: 3, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transF.push({x: zonePlank.x + 60, y: zonePlank.y + 40, carry: 0, state: 'idle'}); } },
            transG: { box: {x: 700, y: 370, w: 140, h: 40}, title: '運G (賣木板)', costs: [200, 600, 1500], count: 0, max: 3, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transG.push({x: zonePlank.x + 60, y: zonePlank.y + 40, carry: 0, state: 'idle'}); } },
            plankSpeed: { box: {x: 700, y: 430, w: 140, h: 40}, title: '木板運速 (+50)', costVal: 1500, level: 1, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return this.level < 6; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (Lv.${this.level})` : '滿等'; }, action: function() { this.level++; this.costVal = Math.floor(this.costVal * 1.8); tPlankSpd += 50; } },
            plankCar: { box: {x: 700, y: 480, w: 140, h: 40}, title: '木板容量 (+6)', costVal: 2000, level: 1, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return this.level < 6; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (Lv.${this.level})` : '滿等'; }, action: function() { this.level++; this.costVal = Math.floor(this.costVal * 2.0); tPlankCar += 2; } },

            cashierLog: { box: {x: counterLog.x + 300, y: counterLog.y + 5, w: 140, h: 38}, title: '自動收銀 (原木)', costVal: 200, bought: false, cd: 0, req: function() { return !this.bought; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal}` : '已配置'; }, action: function() { this.bought = true; } },
            priceLog: { box: {x: counterLog.x + 300, y: counterLog.y + 48, w: 140, h: 38}, title: '原木漲價 (+$2)', costVal: 300, level: 1, cd: 0, req: function() { return true; }, cost: function() { return this.costVal; }, desc: function() { return `[現:$${pLog}] 升:$${this.costVal}`; }, action: function() { this.level++; this.costVal = Math.floor(this.costVal * 1.5); pLog += 2; } },

            cashierLumber: { box: {x: counterLumber.x + 300, y: counterLumber.y + 5, w: 140, h: 38}, title: '自動收銀 (木材)', costVal: 800, bought: false, cd: 0, hidden: function() { return upgrades.m1Buy.count === 0; }, req: function() { return !this.bought; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal}` : '已配置'; }, action: function() { this.bought = true; } },
            priceLumber: { box: {x: counterLumber.x + 300, y: counterLumber.y + 48, w: 140, h: 38}, title: '木材漲價 (+$5)', costVal: 800, level: 1, cd: 0, hidden: function() { return upgrades.m1Buy.count === 0; }, req: function() { return true; }, cost: function() { return this.costVal; }, desc: function() { return `[現:$${pLumb}] 升:$${this.costVal}`; }, action: function() { this.level++; this.costVal = Math.floor(this.costVal * 1.6); pLumb += 5; } },

            cashierPlank: { box: {x: counterPlank.x + 300, y: counterPlank.y + 5, w: 140, h: 38}, title: '自動收銀 (木板)', costVal: 2000, bought: false, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return !this.bought; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal}` : '已配置'; }, action: function() { this.bought = true; } },
            pricePlank: { box: {x: counterPlank.x + 300, y: counterPlank.y + 48, w: 140, h: 38}, title: '木板漲價 (+$4)', costVal: 2000, level: 1, cd: 0, hidden: function() { return upgrades.m2Buy.count === 0; }, req: function() { return true; }, cost: function() { return this.costVal; }, desc: function() { return `[現:$${pPlank}] 升:$${this.costVal}`; }, action: function() { this.level++; this.costVal = Math.floor(this.costVal * 1.6); pPlank += 4; } }
        };

        function updateUIPositions() {
            let bottomY = startY + (forestRows * spacing);
            upgrades.speed.box.y = bottomY + 30;
            upgrades.auto.box.y = bottomY + 30;
            upgrades.chopBotSpeed.box.y = bottomY + 80;
            upgrades.chopBotCarry.box.y = bottomY + 80;
            upgrades.playerSpeed.box.y = bottomY + 130;
            upgrades.expand.box.y = bottomY + 130;
        }

        function formatTime(ts) {
            if (!ts) return '無紀錄';
            let d = new Date(ts);
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }

        function saveGame() {
            const data = {
                version: 11, 
                tutorialStep: tutorialStep,
                money: money,
                globals: { tWoodSpd, tWoodCar, tLumbSpd, tLumbCar, tPlankSpd, tPlankCar, gChopSpeed, gChopCarry, gChopTime, pLog, pLumb, pPlank },
                player: { wood: player.wood, lumber: player.lumber, plank: player.plank, speed: player.speed, x: player.x, y: player.y },
                counterLog: counterLog, counterLumber: counterLumber, counterPlank: counterPlank,
                zoneWood: zoneWood, zoneLumber: zoneLumber, zonePlank: zonePlank,
                forestCols: forestCols, forestRows: forestRows,
                trees: trees.map(t => ({ isCut: t.isCut, respawnTimer: t.respawnTimer, currentStage: t.currentStage })),
                firstInteractionTime: firstInteractionTime, lastInteractionTime: lastInteractionTime,
                upgrades: {}
            };
            for(let key in upgrades) {
                let u = upgrades[key];
                data.upgrades[key] = { level: u.level, count: u.count, costVal: u.costVal, bought: u.bought, maxTime: u.maxTime };
            }
            localStorage.setItem('lumberjack_save', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('lumberjack_save');
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                if (data.version !== 11) return false; 
                
                tutorialStep = data.tutorialStep || 0;
                money = data.money || 0;
                if (data.globals) { 
                    tWoodSpd = data.globals.tWoodSpd || 250; tWoodCar = data.globals.tWoodCar || 5; 
                    tLumbSpd = data.globals.tLumbSpd || 250; tLumbCar = data.globals.tLumbCar || 5; 
                    tPlankSpd = data.globals.tPlankSpd || 250; tPlankCar = data.globals.tPlankCar || 5; 
                    gChopSpeed = data.globals.gChopSpeed || 250; gChopCarry = data.globals.gChopCarry || 3;
                    gChopTime = data.globals.gChopTime || 6.0;
                    pLog = data.globals.pLog || 5; pLumb = data.globals.pLumb || 15; pPlank = data.globals.pPlank || 10; 
                }
                Object.assign(player, data.player);
                Object.assign(counterLog, data.counterLog); Object.assign(counterLumber, data.counterLumber); Object.assign(counterPlank, data.counterPlank);
                Object.assign(zoneWood, data.zoneWood); Object.assign(zoneLumber, data.zoneLumber); Object.assign(zonePlank, data.zonePlank);
                forestCols = data.forestCols || 5; forestRows = data.forestRows || 5;
                firstInteractionTime = data.firstInteractionTime; lastInteractionTime = data.lastInteractionTime;
                
                for(let key in data.upgrades) {

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            let lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                let chars = lines[i].split(''); let line = '';
                for (let n = 0; n < chars.length; n++) {
                    let testLine = line + chars[n]; let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) { ctx.fillText(line, x, y); line = chars[n]; y += lineHeight; } 
                    else { line = testLine; }
                }
                ctx.fillText(line, x, y); y += lineHeight;
            }
        }

            if (upgrades.m1Buy.count > 0) checkCounter(counterLumber, 'lumber', customersLumber, upgrades.cashierLumber, pLumb);
            if (upgrades.m2Buy.count > 0) checkCounter(counterPlank, 'plank', customersPlank, upgrades.cashierPlank, pPlank);

            if (upgrades.cashierLog.bought) { cashierTimerLog -= dt; if (cashierTimerLog <= 0) { processTransaction(counterLog, customersLog, pLog); cashierTimerLog = 0.5; } }
            if (upgrades.cashierLumber.bought) { cashierTimerLumber -= dt; if (cashierTimerLumber <= 0) { processTransaction(counterLumber, customersLumber, pLumb); cashierTimerLumber = 0.5; } }
            if (upgrades.cashierPlank.bought) { cashierTimerPlank -= dt; if (cashierTimerPlank <= 0) { processTransaction(counterPlank, customersPlank, pPlank); cashierTimerPlank = 0.5; } }

            let standingOnUpgrade = null;
            Object.values(upgrades).forEach(up => { if (up.cd > 0) up.cd -= dt; if (up.hidden && up.hidden()) return; if (inZone(player.x, player.y, up.box) && up.req() && up.cd <= 0) standingOnUpgrade = up; });
            if (standingOnUpgrade && money >= standingOnUpgrade.cost()) { uiOkBtn.active = true; uiOkBtn.target = standingOnUpgrade; } else { uiOkBtn.active = false; uiOkBtn.target = null; }
            
            spawnTimerLog -= dt; if (spawnTimerLog <= 0) { if (customersLog.length < 10) customersLog.push({ need: Math.floor(Math.random() * 7) + 2 }); spawnTimerLog = 2.0; }
            if (upgrades.m1Buy.count > 0) { spawnTimerLumber -= dt; if (spawnTimerLumber <= 0) { if (customersLumber.length < 10) customersLumber.push({ need: Math.floor(Math.random() * 5) + 2 }); spawnTimerLumber = 3.0; } }
            if (upgrades.m2Buy.count > 0) { spawnTimerPlank -= dt; if (spawnTimerPlank <= 0) { if (customersPlank.length < 10) customersPlank.push({ need: Math.floor(Math.random() * 8) + 3 }); spawnTimerPlank = 2.5; } }

            saveTimer -= dt; if (saveTimer <= 0) { saveGame(); saveTimer = 3.0; }
        }

        function drawCounter(counter, title, itemLabel, cashierObj, currentPrice) { 
            const zW = counter.width / 3; 
            ctx.fillStyle = '#FFD700'; ctx.fillRect(counter.x, counter.y, zW, counter.height); 
            ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText('領錢區', counter.x + 15, counter.y + 35); ctx.fillText(`$${counter.money}`, counter.x + 15, counter.y + 65); 
            ctx.fillStyle = '#8B4513'; ctx.fillRect(counter.x + zW, counter.y, zW, counter.height); 
            ctx.fillStyle = '#FFF'; ctx.fillText('結帳區', counter.x + zW + 15, counter.y + 25); 
            ctx.font = '12px Arial'; ctx.fillText(title, counter.x + zW + 10, counter.y + 50); 
            ctx.fillStyle = '#FFD700'; ctx.fillText(`單價: $${currentPrice}`, counter.x + zW + 10, counter.y + 75); 
            if (cashierObj.bought) { ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(counter.x + zW * 1.5, counter.y + 15, 8, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#FFF'; ctx.fillText('收銀員', counter.x + zW + 22, counter.y + 85); } 
            ctx.fillStyle = '#DEB887'; ctx.fillRect(counter.x + zW * 2, counter.y, zW, counter.height); 
            ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText('放置區', counter.x + zW * 2 + 15, counter.y + 35); ctx.fillText(`${itemLabel}:${counter.count}`, counter.x + zW * 2 + 15, counter.y + 65); 
        }

        function drawCustomers(counter, customersArr) { customersArr.forEach((c, i) => { if (i > 4) return; let cx = counter.x + (counter.width/3) * 1.5 + (i * 45), cy = counter.y + counter.height + 30; ctx.fillStyle = '#FF6347'; ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(`需:${c.need}`, cx - 15, cy + 5); }); if (customersArr.length > 5) { ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(`+${customersArr.length - 5} 人排隊`, counter.x + (counter.width/3) * 1.5 + 225, counter.y + counter.height + 35); } }
        function drawButton(upObj) { if (upObj.hidden && upObj.hidden()) return; let enabled = upObj.req(); ctx.fillStyle = enabled ? '#ADD8E6' : '#A9A9A9'; ctx.fillRect(upObj.box.x, upObj.box.y, upObj.box.w, upObj.box.h); ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(upObj.title, upObj.box.x + 10, upObj.box.y + 18); ctx.fillText(upObj.desc(), upObj.box.x + 10, upObj.box.y + 34); }
        function drawItemDots(x, y, count, color) { ctx.fillStyle = color; let dots = Math.min(count, 15); for (let i = 0; i < dots; i++) { let angle = i * (Math.PI * 2 / Math.max(dots, 1)); ctx.beginPath(); ctx.arc(x + Math.cos(angle)*8, y + Math.sin(angle)*8, 3, 0, Math.PI * 2); ctx.fill(); } }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-camera.x, -camera.y);
            
            ctx.strokeStyle = 'rgba(107, 142, 35, 0.3)'; ctx.lineWidth = 1; 
            for(let i=0; i<WORLD_WIDTH; i+=100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_HEIGHT); ctx.stroke(); } 
            for(let i=0; i<WORLD_HEIGHT; i+=100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_WIDTH, i); ctx.stroke(); }
            
            drawCounter(counterLog, "(原木)", "木", upgrades.cashierLog, pLog); drawCustomers(counterLog, customersLog); 
            if (upgrades.m1Buy.count > 0) { drawCounter(counterLumber, "(木材)", "材", upgrades.cashierLumber, pLumb); drawCustomers(counterLumber, customersLumber); }
            if (upgrades.m2Buy.count > 0) { drawCounter(counterPlank, "(木板)", "板", upgrades.cashierPlank, pPlank); drawCustomers(counterPlank, customersPlank); }

            const drawZone = (zone, title, color) => { ctx.fillStyle = '#EEE8AA'; ctx.fillRect(zone.x, zone.y, zone.w, zone.h); ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText(title, zone.x + 20, zone.y + 35); ctx.fillStyle = color; ctx.fillText(`存量: ${zone.count}`, zone.x + 20, zone.y + 60); };
            drawZone(zoneWood, `原木集中區`, '#8B4513');
            if(upgrades.m1Buy.count > 0) drawZone(zoneLumber, `木材集中區`, '#D2691E');
            if(upgrades.m2Buy.count > 0) drawZone(zonePlank, `木板集中區`, '#DAA520');

            const drawMachine = (m, name, spdUp) => { ctx.fillStyle = '#808080'; ctx.fillRect(m.x, m.y, m.w, m.h); ctx.fillStyle = '#FFF'; ctx.font = '14px Arial'; ctx.fillText(name, m.x + 10, m.y + 35); ctx.fillStyle = '#DEB887'; ctx.fillRect(m.x + m.w, m.y + 10, 40, 40); ctx.fillStyle = '#333'; ctx.fillText(`入:${m.inCount}`, m.x + m.w + 5, m.y + 35); ctx.fillStyle = '#F4A460'; ctx.fillRect(m.x - 40, m.y + 10, 40, 40); ctx.fillStyle = '#333'; ctx.fillText(`出:${m.outCount}`, m.x - 35, m.y + 35); ctx.fillStyle = '#4682B4'; ctx.beginPath(); ctx.arc(m.x + m.w/2, m.y - 15, 12, 0, Math.PI * 2); ctx.fill(); if(m.timer > 0) { let prog = 1 - (m.timer / spdUp.maxTime); ctx.fillStyle = 'red'; ctx.fillRect(m.x + 10, m.y - 5, 80, 4); ctx.fillStyle = 'lime'; ctx.fillRect(m.x + 10, m.y - 5, 80 * prog, 4); } };
            machines1.forEach(m => drawMachine(m, '去皮剖木機', upgrades.m1Speed));
            machines2.forEach(m => drawMachine(m, '木板切割機', upgrades.m2Speed));

            Object.values(upgrades).forEach(up => drawButton(up));

            trees.forEach(tree => {
                let safeStage = Math.max(0, Math.min(6, tree.currentStage || 0));
                let stageData = TREE_STAGES[safeStage];
                if (!stageData) return; 
                let cx = tree.x + treeSize / 2; let cy = tree.y + treeSize / 2;
                if (safeStage === 0) { ctx.fillStyle = stageData.color; ctx.fillRect(tree.x + 5, tree.y + treeSize - stageData.trunkH, treeSize - 10, stageData.trunkH); if (tree.isCut) { ctx.fillStyle = '#333'; ctx.font = '12px Arial'; ctx.fillText(`${Math.ceil(tree.respawnTimer)}s`, tree.x + 5, tree.y + treeSize - 15); } } 
                else { ctx.fillStyle = '#8B4513'; let trunkW = treeSize / 3; ctx.fillRect(cx - trunkW / 2, cy + treeSize / 2 - stageData.trunkH, trunkW, stageData.trunkH); ctx.fillStyle = stageData.color; let leafY = cy + treeSize / 2 - stageData.trunkH; ctx.beginPath(); ctx.arc(cx, leafY, stageData.radius, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = this.pSBC ? pSBC(0.1, stageData.color) : stageData.color; ctx.beginPath(); ctx.arc(cx, leafY - stageData.radius / 2, stageData.radius * 0.8, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx, leafY - stageData.radius, stageData.radius * 0.6, 0, Math.PI * 2); ctx.fill(); }
            });

            const drawBot = (arr, botColor, itemColor, isChopBot = false) => { 
                arr.forEach(b => { 
                    ctx.fillStyle = botColor; ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, Math.PI * 2); ctx.fill(); 
                    if (b.carry > 0) drawItemDots(b.x, b.y, b.carry, itemColor); 
                    if (isChopBot && b.chopTimer > 0) { 
                        let prog = 1 - (b.chopTimer / gChopTime); 
                        ctx.fillStyle = 'red'; ctx.fillRect(b.x - 15, b.y - 20, 30, 4); ctx.fillStyle = 'lime'; ctx.fillRect(b.x - 15, b.y - 20, 30 * prog, 4); 
                    } 
                }); 
            };
            drawBot(autoChoppers, '#8A2BE2', '#5C3A21', true); 
            drawBot(transA, '#FF8C00', '#5C3A21'); drawBot(transB, '#DC143C', '#5C3A21'); 
            drawBot(transC, '#FFD700', '#FFA500'); drawBot(transD, '#32CD32', '#FFA500'); drawBot(transE, '#00CED1', '#FFA500');
            drawBot(transF, '#FF1493', '#F5DEB3'); drawBot(transG, '#8B008B', '#F5DEB3');

            ctx.fillStyle = '#4169E1'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            if (player.wood > 0) drawItemDots(player.x, player.y, player.wood, '#5C3A21'); 
            else if (player.lumber > 0) drawItemDots(player.x, player.y, player.lumber, '#FFA500'); 
            else if (player.plank > 0) drawItemDots(player.x, player.y, player.plank, '#F5DEB3'); 
            if (choppingTree && choppingTree.currentStage > 0) { let prog = 1 - (player.chopTimer / gChopTime); ctx.fillStyle = 'red'; ctx.fillRect(player.x - 20, player.y - 30, 40, 6); ctx.fillStyle = 'lime'; ctx.fillRect(player.x - 20, player.y - 30, 40 * prog, 6); }
            ctx.restore();

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(10, 10, 240, 150); ctx.fillStyle = '#FFF'; ctx.font = '24px Arial'; ctx.fillText(`總資產: $${money}`, 20, 40); ctx.font = '18px Arial'; ctx.fillStyle = '#CD853F'; ctx.fillText(`身上原木: ${player.wood}`, 20, 75); ctx.fillStyle = '#FFA500'; ctx.fillText(`身上木材: ${player.lumber}`, 20, 105); ctx.fillStyle = '#F5DEB3'; ctx.fillText(`身上木板: ${player.plank}`, 20, 135);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.radius, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.beginPath(); ctx.arc(joystick.x + joystick.knobX, joystick.y + joystick.knobY, 25, 0, Math.PI * 2); ctx.fill();
            if (uiOkBtn.active && uiOkBtn.target) { ctx.fillStyle = '#32CD32'; ctx.fillRect(uiOkBtn.x, uiOkBtn.y, uiOkBtn.w, uiOkBtn.h); ctx.strokeStyle = '#006400'; ctx.lineWidth = 4; ctx.strokeRect(uiOkBtn.x, uiOkBtn.y, uiOkBtn.w, uiOkBtn.h); ctx.fillStyle = '#FFF'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText(`確認購買 ($${uiOkBtn.target.cost()})`, uiOkBtn.x + uiOkBtn.w / 2, uiOkBtn.y + 35); ctx.textAlign = 'left'; }
            
            ctx.fillStyle = '#CD5C5C'; ctx.fillRect(clearSaveBtn.x, clearSaveBtn.y, clearSaveBtn.w, clearSaveBtn.h); ctx.fillStyle = '#FFF'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.fillText('清除存檔', clearSaveBtn.x + clearSaveBtn.w / 2, clearSaveBtn.y + 25); ctx.textAlign = 'left';
            ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText(`首次互動: ${formatTime(firstInteractionTime)}`, 10, canvas.height - 35); ctx.fillText(`最後互動: ${formatTime(lastInteractionTime)}`, 10, canvas.height - 10);
            
            if (tutorialShowing) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let boxW = Math.min(canvas.width * 0.85, 450); let boxH = 260; let boxX = canvas.width / 2 - boxW / 2; let boxY = canvas.height / 2 - boxH / 2;
                ctx.fillStyle = '#222'; ctx.fillRect(boxX, boxY, boxW, boxH); ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.strokeRect(boxX, boxY, boxW, boxH);
                ctx.fillStyle = '#FFD700'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; wrapText(ctx, tutorialText, canvas.width / 2, boxY + 45, boxW - 40, 30);
                ctx.fillStyle = '#32CD32'; ctx.fillRect(canvas.width / 2 - 80, boxY + boxH - 60, 160, 40); ctx.fillStyle = '#FFF'; ctx.font = 'bold 18px Arial'; ctx.fillText('點擊畫面繼續', canvas.width / 2, boxY + boxH - 34); ctx.textAlign = 'left'; 
            }
        }

        function loop(timestamp) { let rawDt = (timestamp - lastTime) / 1000; let dt = Math.max(0, Math.min(0.1, rawDt)); lastTime = timestamp; update(dt); draw(); requestAnimationFrame(loop); }
        requestAnimationFrame(loop);
        function pSBC(p, c0) { let r, g, b, P, i, f, Math_round = Math.round, d = c0.length>5?c0:null; if (!d) return null; P = p < 0; i = parseInt; f = d.slice(1); P = p < 0 ? p * -1 : p; P = 1 - P; r = i(f.slice(0, 2), 16); g = i(f.slice(2, 4), 16); b = i(f.slice(4, 6), 16); r = Math_round(r * P); g = Math_round(g * P); b = Math_round(b * P); return "#" + (0x1000000 + (r * 0x10000) + (g * 0x100) + b).toString(16).slice(1); }
    </script>
</body>
