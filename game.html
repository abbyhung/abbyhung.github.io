        function handleInputStart(e, clientX, clientY, id) {

            if (isInsideUI(clientX, clientY, clearSaveBtn)) { if (confirm("確定要清除所有存檔並重新開始嗎？\n注意：這將無法恢復！")) { localStorage.removeItem('lumberjack_save_v14'); location.reload(); } return; }

            // 傳送陣點擊
            let tpClicked = false;
            let gap = 10; let totalW = teleports.length * 80 + (teleports.length - 1) * gap;

            let dx = clientX - joystick.x, dy = clientY - joystick.y; 
            if (Math.hypot(dx, dy) < joystick.radius + 40) { joystick.active = true; joystick.touchId = id; updateJoystick(clientX, clientY); } 
        }
        function updateJoystick(clientX, clientY) { if (!joystick.active) return; recordInteraction(); let dx = clientX - joystick.x, dy = clientY - joystick.y, dist = Math.hypot(dx, dy); joystick.angle = Math.atan2(dy, dx); joystick.pull = Math.min(dist, joystick.radius) / joystick.radius; joystick.knobX = Math.cos(joystick.angle) * joystick.pull * joystick.radius; joystick.knobY = Math.sin(joystick.angle) * joystick.pull * joystick.radius; }
        function handleInputEnd(id) { if (joystick.touchId === id || id === 'mouse') { joystick.active = false; joystick.touchId = null; joystick.knobX = 0; joystick.knobY = 0; } }

        function processTransaction(counter, customersArr, pricePerItem) { 
            if(customersArr.length === 0) return; 
            let current = customersArr[0], stock = counter.count; 
            let sellAmount = Math.min(stock, current.need); 
            counter.count -= sellAmount; current.need -= sellAmount; 
            counter.money += sellAmount * pricePerItem; 
            if (current.need <= 0) customersArr.shift(); 
        }

        function processSetTransaction(counter, customersArr) {
            if(customersArr.length === 0) return;
            let current = customersArr[0];
            let setsAvail = Math.floor(Math.min(counter.chair / 4, counter.table / 1));
            let sellAmount = Math.min(setsAvail, current.need);
            counter.chair -= sellAmount * 4; counter.table -= sellAmount * 1;
            current.need -= sellAmount; counter.money += sellAmount * pSet;
            if (current.need <= 0) customersArr.shift();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            let lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                let chars = lines[i].split(''); let line = '';
                for (let n = 0; n < chars.length; n++) {
                    let testLine = line + chars[n]; let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) { ctx.fillText(line, x, y); line = chars[n]; y += lineHeight; } else { line = testLine; }
                }
                ctx.fillText(line, x, y); y += lineHeight;
            }
        }

                if (distTo(player.x, player.y, counter.x + zoneW * 1.5, cY) < interactRad && !cashierObj.bought) processTransaction(counter, customersArr, price); 
                if (distTo(player.x, player.y, counter.x + zoneW * 0.5, cY) < interactRad && counter.money > 0) { money += counter.money; counter.money = 0; } 
            };
            checkCounter(counterLog, 'wood', custLog, upgrades.cashLog, pLog); 
            if (upgrades.m1Buy.count > 0) checkCounter(counterLumber, 'lumber', custLumb, upgrades.cashLumb, pLumb);
            if (upgrades.m2Buy.count > 0) checkCounter(counterPlank, 'plank', custPlank, upgrades.cashPlank, pPlank);
            if (upgrades.m3Buy.count > 0) checkCounter(counterChair, 'chair', custChair, upgrades.cashChair, pChair);
            if (upgrades.m4Buy.count > 0) checkCounter(counterTable, 'table', custTable, upgrades.cashTable, pTable);

            // Set Counter Check
            if (upgrades.m3Buy.count > 0 && upgrades.m4Buy.count > 0) {
                const zW = counterSet.width/3; let cY = counterSet.y + counterSet.height/2;
                if(distTo(player.x, player.y, counterSet.x + zW*2.5, cY)<interactRad) { if(player.chair>0){counterSet.chair+=player.chair;player.chair=0;} if(player.table>0){counterSet.table+=player.table;player.table=0;} }
                if(distTo(player.x, player.y, counterSet.x + zW*1.5, cY)<interactRad && !upgrades.cashSet.bought) processSetTransaction(counterSet, custSet);
                if(distTo(player.x, player.y, counterSet.x + zW*0.5, cY)<interactRad && counterSet.money>0){money+=counterSet.money;counterSet.money=0;}
            }

            if (upgrades.cashLog.bought) { sT_Log -= dt; if (sT_Log <= 0) { processTransaction(counterLog, custLog, pLog); sT_Log = 0.5; } }
            if (upgrades.cashLumb.bought) { sT_Lumb -= dt; if (sT_Lumb <= 0) { processTransaction(counterLumber, custLumb, pLumb); sT_Lumb = 0.5; } }
            if (upgrades.cashPlank.bought) { sT_Plank -= dt; if (sT_Plank <= 0) { processTransaction(counterPlank, custPlank, pPlank); sT_Plank = 0.5; } }
            if (upgrades.cashChair.bought) { sT_Chair -= dt; if (sT_Chair <= 0) { processTransaction(counterChair, custChair, pChair); sT_Chair = 0.5; } }
            if (upgrades.cashTable.bought) { sT_Table -= dt; if (sT_Table <= 0) { processTransaction(counterTable, custTable, pTable); sT_Table = 0.5; } }
            if (upgrades.cashSet.bought) { sT_Set -= dt; if (sT_Set <= 0) { processSetTransaction(counterSet, custSet); sT_Set = 0.5; } }

            let standingOnUpgrade = null;
            Object.values(upgrades).forEach(up => { if (up.cd > 0) up.cd -= dt; if (up.hidden && up.hidden()) return; if (inZone(player.x, player.y, up.box) && up.req() && up.cd <= 0) standingOnUpgrade = up; });
            if (standingOnUpgrade && money >= standingOnUpgrade.cost()) { uiOkBtn.active = true; uiOkBtn.target = standingOnUpgrade; } else { uiOkBtn.active = false; uiOkBtn.target = null; }
            
            spawnTimerLog -= dt; if (spawnTimerLog <= 0) { if (custLog.length < 10) custLog.push({ need: Math.floor(Math.random() * 7) + 2 + gLogDem }); spawnTimerLog = gLogSpawn; }
            if (upgrades.m1Buy.count > 0) { spawnTimerLumber -= dt; if (spawnTimerLumber <= 0) { if (custLumb.length < 10) custLumb.push({ need: Math.floor(Math.random() * 5) + 2 + gLumbDem }); spawnTimerLumber = gLumbSpawn; } }
            if (upgrades.m2Buy.count > 0) { spawnTimerPlank -= dt; if (spawnTimerPlank <= 0) { if (custPlank.length < 10) custPlank.push({ need: Math.floor(Math.random() * 8) + 3 + gPlankDem }); spawnTimerPlank = gPlankSpawn; } }
            if (upgrades.m3Buy.count > 0) { spawnTimerChair -= dt; if (spawnTimerChair <= 0) { if (custChair.length < 10) custChair.push({ need: Math.floor(Math.random() * 3) + 1 + gChairDem }); spawnTimerChair = gChairSpawn; } } else spawnTimerChair = 0;
            if (upgrades.m4Buy.count > 0) { spawnTimerTable -= dt; if (spawnTimerTable <= 0) { if (custTable.length < 10) custTable.push({ need: Math.floor(Math.random() * 2) + 1 + gTableDem }); spawnTimerTable = gTableSpawn; } } else spawnTimerTable = 0;
            if (upgrades.m3Buy.count > 0 && upgrades.m4Buy.count > 0) { spawnTimerSet -= dt; if (spawnTimerSet <= 0) { if (custSet.length < 5) custSet.push({ need: Math.floor(Math.random() * 2) + 1 + gSetDem }); spawnTimerSet = gSetSpawn; } } else spawnTimerSet = 0;

            saveTimer -= dt; if (saveTimer <= 0) { saveGame(); saveTimer = 3.0; }
        }
        let spawnTimerChair=0, spawnTimerTable=0, spawnTimerSet=0;

        function drawCounter(counter, title, itemLabel, cashierObj, currentPrice) { 
            const zW = counter.width / 3; 
            ctx.fillStyle = '#FFD700'; ctx.fillRect(counter.x, counter.y, zW, counter.height); 
            ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText('領錢區', counter.x + 15, counter.y + 35); ctx.fillText(`$${counter.money}`, counter.x + 15, counter.y + 65); 
            ctx.fillStyle = '#8B4513'; ctx.fillRect(counter.x + zW, counter.y, zW, counter.height); 
            ctx.fillStyle = '#FFF'; ctx.fillText('結帳區', counter.x + zW + 15, counter.y + 25); 
            ctx.font = '12px Arial'; ctx.fillText(title, counter.x + zW + 10, counter.y + 50); 
            ctx.fillStyle = '#FFD700'; ctx.fillText(`單價: $${currentPrice}`, counter.x + zW + 10, counter.y + 75); 
            if (cashierObj && cashierObj.bought) { ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(counter.x + zW * 1.5, counter.y + 90, 8, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#FFF'; ctx.fillText('收銀員', counter.x + zW + 22, counter.y + 95); } 
            ctx.fillStyle = '#DEB887'; ctx.fillRect(counter.x + zW * 2, counter.y, zW, counter.height); 
            ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText('放置區', counter.x + zW * 2 + 15, counter.y + 35); 
            
            if(title === "餐桌組(4椅1桌)") {
                ctx.font = '12px Arial'; ctx.fillText(`椅:${counter.chair}`, counter.x + zW * 2 + 10, counter.y + 60); ctx.fillText(`桌:${counter.table}`, counter.x + zW * 2 + 10, counter.y + 80);
            } else {
                ctx.fillText(`${itemLabel}:${counter.count}`, counter.x + zW * 2 + 15, counter.y + 65); 
            }
        }

        function drawCustomers(counter, customersArr) { customersArr.forEach((c, i) => { if (i > 4) return; let cx = counter.x + (counter.width/3) * 1.5 + (i * 45), cy = counter.y + counter.height + 30; ctx.fillStyle = '#FF6347'; ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(`需:${c.need}`, cx - 15, cy + 5); }); if (customersArr.length > 5) { ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(`+${customersArr.length - 5} 人排隊`, counter.x + (counter.width/3) * 1.5 + 225, counter.y + counter.height + 35); } }
        function drawButton(upObj) { if (upObj.hidden && upObj.hidden()) return; let enabled = upObj.req(); ctx.fillStyle = enabled ? '#ADD8E6' : '#A9A9A9'; ctx.fillRect(upObj.box.x, upObj.box.y, upObj.box.w, upObj.box.h); ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(upObj.title, upObj.box.x + 10, upObj.box.y + 18); ctx.fillText(upObj.desc(), upObj.box.x + 10, upObj.box.y + 34); }
        function drawItemDots(x, y, count, color) { ctx.fillStyle = color; let dots = Math.min(count, 15); for (let i = 0; i < dots; i++) { let angle = i * (Math.PI * 2 / Math.max(dots, 1)); ctx.beginPath(); ctx.arc(x + Math.cos(angle)*8, y + Math.sin(angle)*8, 3, 0, Math.PI * 2); ctx.fill(); } }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-camera.x, -camera.y);
            
            ctx.strokeStyle = 'rgba(107, 142, 35, 0.3)'; ctx.lineWidth = 1; 
            for(let i=0; i<WORLD_WIDTH; i+=100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_HEIGHT); ctx.stroke(); } 
            for(let i=0; i<WORLD_HEIGHT; i+=100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_WIDTH, i); ctx.stroke(); }
            
            drawCounter(counterLog, "原木專賣", "木", upgrades.cashLog, pLog); drawCustomers(counterLog, custLog); 
            if (upgrades.m1Buy.count > 0) { drawCounter(counterLumber, "木材專賣", "材", upgrades.cashLumb, pLumb); drawCustomers(counterLumber, custLumb); }
            if (upgrades.m2Buy.count > 0) { drawCounter(counterPlank, "木板專賣", "板", upgrades.cashPlank, pPlank); drawCustomers(counterPlank, custPlank); }
            if (upgrades.m3Buy.count > 0) { drawCounter(counterChair, "椅子專賣", "椅", upgrades.cashChair, pChair); drawCustomers(counterChair, custChair); }
            if (upgrades.m4Buy.count > 0) { drawCounter(counterTable, "桌子專賣", "桌", upgrades.cashTable, pTable); drawCustomers(counterTable, custTable); }
            if (upgrades.m3Buy.count > 0 && upgrades.m4Buy.count > 0) { drawCounter(counterSet, "餐桌組(4椅1桌)", "套", upgrades.cashSet, pSet); drawCustomers(counterSet, custSet); }

            const drawZone = (zone, title, color) => { ctx.fillStyle = '#EEE8AA'; ctx.fillRect(zone.x, zone.y, zone.w, zone.h); ctx.fillStyle = '#333'; ctx.font = '16px Arial'; ctx.fillText(title, zone.x + 20, zone.y + 35); ctx.fillStyle = color; ctx.fillText(`存量: ${zone.count}`, zone.x + 20, zone.y + 60); };
            drawZone(zoneWood, `原木集中區`, '#8B4513');
            if(upgrades.m1Buy.count > 0) drawZone(zoneLumber, `木材集中區`, '#D2691E');
            if(upgrades.m2Buy.count > 0) drawZone(zonePlank, `木板集中區`, '#DAA520');
            if(upgrades.m3Buy.count > 0) drawZone(zoneChair, `椅子暫存區`, '#A52A2A');
            if(upgrades.m4Buy.count > 0) drawZone(zoneTable, `桌子暫存區`, '#8B4513');

            const drawMachine = (m, name, spdUp, bladeLvl, maxIn) => { 
                ctx.fillStyle = '#808080'; ctx.fillRect(m.x, m.y, m.w, m.h); 
                ctx.fillStyle = '#FFF'; ctx.font = '14px Arial'; ctx.fillText(name, m.x + 10, m.y + 25); 
                if(bladeLvl) { ctx.fillStyle = '#FFD700'; ctx.font = '10px Arial'; ctx.fillText(`刀片: Lv.${bladeLvl}`, m.x + 10, m.y + 40); }
                ctx.fillStyle = '#DEB887'; ctx.fillRect(m.x + m.w, m.y + 10, 45, 40); ctx.fillStyle = '#333'; ctx.font = '12px Arial'; 
                if(m.inPlank !== undefined && m.inLumb !== undefined) { ctx.fillText(`材:${m.inLumb}`, m.x + m.w + 2, m.y + 25); ctx.fillText(`板:${m.inPlank}`, m.x + m.w + 2, m.y + 40); }
                else { ctx.fillText(`入:${m.inLumb}/${maxIn}`, m.x + m.w + 2, m.y + 35); }
                ctx.fillStyle = '#F4A460'; ctx.fillRect(m.x - 45, m.y + 10, 45, 40); ctx.fillStyle = '#333'; ctx.fillText(`出:${m.outCount}`, m.x - 43, m.y + 35); 
                ctx.fillStyle = '#4682B4'; ctx.beginPath(); ctx.arc(m.x + m.w/2, m.y - 15, 12, 0, Math.PI * 2); ctx.fill(); 
                if(m.timer > 0) { let prog = 1 - (m.timer / spdUp); ctx.fillStyle = 'red'; ctx.fillRect(m.x + 10, m.y - 5, 80, 4); ctx.fillStyle = 'lime'; ctx.fillRect(m.x + 10, m.y - 5, 80 * prog, 4); } 
            };
            machines1.forEach(m => drawMachine(m, '去皮剖木機', upgrades.m1Speed.maxTime, upgrades.m1Blade.level, 100));
            machines2.forEach(m => drawMachine(m, '木板切割機', upgrades.m2Speed.maxTime, upgrades.m2Blade.level, 100));
            machines3.forEach(m => drawMachine(m, '椅子(10材4板)', 2.0, null, 50));
            machines4.forEach(m => drawMachine(m, '桌子(4材10板)', 3.0, null, 50));

            Object.values(upgrades).forEach(up => drawButton(up));

            trees.forEach(tree => {
                let safeStage = Math.max(0, Math.min(6, tree.currentStage || 0));
                let stageData = TREE_STAGES[safeStage];
                if (!stageData) return; 
                let cx = tree.x + treeSize / 2; let cy = tree.y + treeSize / 2;
                if (safeStage === 0) { ctx.fillStyle = stageData.color; ctx.fillRect(tree.x + 5, tree.y + treeSize - stageData.trunkH, treeSize - 10, stageData.trunkH); if (tree.isCut) { ctx.fillStyle = '#333'; ctx.font = '12px Arial'; ctx.fillText(`${Math.ceil(tree.respawnTimer)}s`, tree.x + 5, tree.y + treeSize - 15); } } 
                else { ctx.fillStyle = '#8B4513'; let trunkW = treeSize / 3; ctx.fillRect(cx - trunkW / 2, cy + treeSize / 2 - stageData.trunkH, trunkW, stageData.trunkH); ctx.fillStyle = stageData.color; let leafY = cy + treeSize / 2 - stageData.trunkH; ctx.beginPath(); ctx.arc(cx, leafY, stageData.radius, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = this.pSBC ? pSBC(0.1, stageData.color) : stageData.color; ctx.beginPath(); ctx.arc(cx, leafY - stageData.radius / 2, stageData.radius * 0.8, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx, leafY - stageData.radius, stageData.radius * 0.6, 0, Math.PI * 2); ctx.fill(); }
            });

            const drawBot = (arr, botColor, itemColor, isChopBot = false) => { 
                arr.forEach(b => { 
                    ctx.fillStyle = botColor; ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, Math.PI * 2); ctx.fill(); 
                    if (b.carry > 0) drawItemDots(b.x, b.y, b.carry, itemColor); 
                    if (isChopBot && b.chopTimer > 0) { let prog = 1 - (b.chopTimer / gChopTime); ctx.fillStyle = 'red'; ctx.fillRect(b.x - 15, b.y - 20, 30, 4); ctx.fillStyle = 'lime'; ctx.fillRect(b.x - 15, b.y - 20, 30 * prog, 4); } 
                }); 
            };
            drawBot(autoChoppers, '#8A2BE2', '#5C3A21', true); 
            drawBot(transA, '#FF8C00', '#5C3A21'); drawBot(transB, '#DC143C', '#5C3A21'); 
            drawBot(transC, '#FFD700', '#FFA500'); drawBot(transD, '#32CD32', '#FFA500'); drawBot(transE, '#00CED1', '#FFA500');
            drawBot(transF, '#FF1493', '#F5DEB3'); drawBot(transG, '#8B008B', '#F5DEB3');
            drawBot(transH, '#4B0082', '#FFA500'); drawBot(transI, '#FF69B4', '#F5DEB3');
            drawBot(transJ, '#B22222', '#800000'); drawBot(transK, '#556B2F', '#A0522D');
            drawBot(transL, '#DC143C', '#800000'); drawBot(transM, '#8B4513', '#A0522D');

            ctx.fillStyle = '#4169E1'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            if (player.wood > 0) drawItemDots(player.x, player.y, player.wood, '#5C3A21'); 
            else if (player.lumber > 0) drawItemDots(player.x, player.y, player.lumber, '#FFA500'); 
            else if (player.plank > 0) drawItemDots(player.x, player.y, player.plank, '#F5DEB3'); 
            else if (player.chair > 0) drawItemDots(player.x, player.y, player.chair, '#800000'); 
            else if (player.table > 0) drawItemDots(player.x, player.y, player.table, '#A0522D'); 
            if (choppingTree && choppingTree.currentStage > 0) { let prog = 1 - (player.chopTimer / gChopTime); ctx.fillStyle = 'red'; ctx.fillRect(player.x - 20, player.y - 30, 40, 6); ctx.fillStyle = 'lime'; ctx.fillRect(player.x - 20, player.y - 30, 40 * prog, 6); }
            ctx.restore();

            // 傳送陣 UI
            let gap = 10; let totalW = teleports.length * 80 + (teleports.length - 1) * gap;
            let startX = canvas.width - totalW - 20;
            teleports.forEach((tp, i) => {
                let px = startX + i * (80 + gap); let py = canvas.height - 60;
                ctx.fillStyle = tp.color; ctx.fillRect(px, py, 80, 40);
                ctx.fillStyle = '#FFF'; ctx.font = '16px Arial'; ctx.textAlign = 'center';
                ctx.fillText(tp.label, px + 40, py + 25); ctx.textAlign = 'left';
            });

            // 資訊面板按鈕
            ctx.fillStyle = '#4682B4'; ctx.fillRect(statsBtn.x, statsBtn.y, statsBtn.w, statsBtn.h);
            ctx.fillStyle = '#FFF'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.fillText('資料面板', statsBtn.x + statsBtn.w/2, statsBtn.y + 25); ctx.textAlign = 'left';

            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(10, 70, 200, 150); ctx.fillStyle = '#FFF'; ctx.font = '20px Arial'; ctx.fillText(`總資產: $${money}`, 20, 100); ctx.font = '14px Arial'; 
            ctx.fillStyle = '#CD853F'; ctx.fillText(`身上原木: ${player.wood}`, 20, 125); 
            ctx.fillStyle = '#FFA500'; ctx.fillText(`身上木材: ${player.lumber}`, 20, 145); 
            ctx.fillStyle = '#F5DEB3'; ctx.fillText(`身上木板: ${player.plank}`, 20, 165);
            ctx.fillStyle = '#A52A2A'; ctx.fillText(`身上椅子: ${player.chair}`, 20, 185);
            ctx.fillStyle = '#8B4513'; ctx.fillText(`身上桌子: ${player.table}`, 20, 205);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.radius, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.beginPath(); ctx.arc(joystick.x + joystick.knobX, joystick.y + joystick.knobY, 25, 0, Math.PI * 2); ctx.fill();
            if (uiOkBtn.active && uiOkBtn.target) { ctx.fillStyle = '#32CD32'; ctx.fillRect(uiOkBtn.x, uiOkBtn.y, uiOkBtn.w, uiOkBtn.h); ctx.strokeStyle = '#006400'; ctx.lineWidth = 4; ctx.strokeRect(uiOkBtn.x, uiOkBtn.y, uiOkBtn.w, uiOkBtn.h); ctx.fillStyle = '#FFF'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText(`確認購買 ($${uiOkBtn.target.cost()})`, uiOkBtn.x + uiOkBtn.w / 2, uiOkBtn.y + 35); ctx.textAlign = 'left'; }
            
            ctx.fillStyle = '#CD5C5C'; ctx.fillRect(clearSaveBtn.x, clearSaveBtn.y, clearSaveBtn.w, clearSaveBtn.h); ctx.fillStyle = '#FFF'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.fillText('清除存檔', clearSaveBtn.x + clearSaveBtn.w / 2, clearSaveBtn.y + 25); ctx.textAlign = 'left';
            
            // 資料面板
            if (showStats) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(100, 100, canvas.width - 200, canvas.height - 200);
                ctx.fillStyle = '#FFD700'; ctx.font = 'bold 24px Arial'; ctx.fillText('📊 工業帝國產能與數據中心', 130, 150);
                ctx.fillStyle = '#FFF'; ctx.font = '18px Arial';
                let rpm = moneyHistory.length > 1 ? Math.floor((moneyHistory[moneyHistory.length-1] - moneyHistory[0]) * (60 / moneyHistory.length)) : 0;
                ctx.fillText(`💵 預估每分鐘營收: $${rpm}`, 130, 190);
                ctx.fillText(`🪓 砍樹工總數: ${upgrades.auto.count}/15`, 130, 230);
                ctx.fillText(`🚚 運輸工總數: ${transA.length+transB.length+transC.length+transD.length+transE.length+transF.length+transG.length+transH.length+transI.length+transJ.length+transK.length+transL.length+transM.length} 人`, 130, 260);
                ctx.fillText(`🏭 機器狀態: [去皮] ${machines1.length} 台 | [切割] ${machines2.length} 台 | [椅子] ${machines3.length} 台 | [桌子] ${machines4.length} 台`, 130, 290);
                ctx.fillText(`📦 集中區庫存: 原木(${zoneWood.count}) | 木材(${zoneLumber.count}) | 木板(${zonePlank.count}) | 椅子(${zoneChair.count}) | 桌子(${zoneTable.count})`, 130, 320);
                let cutRate = (upgrades.auto.count * gChopCarry) / gChopTime;
                ctx.fillText(`📈 理論伐木極限產能: 每秒 ${cutRate.toFixed(1)} 根原木`, 130, 350);
                
                ctx.fillStyle = '#FF6347'; ctx.fillText('(點擊左上角「資料面板」按鈕關閉)', 130, 400);
            }

            if (tutorialShowing) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let boxW = Math.min(canvas.width * 0.85, 450); let boxH = 260; let boxX = canvas.width / 2 - boxW / 2; let boxY = canvas.height / 2 - boxH / 2;
                ctx.fillStyle = '#222'; ctx.fillRect(boxX, boxY, boxW, boxH); ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4; ctx.strokeRect(boxX, boxY, boxW, boxH);
                ctx.fillStyle = '#FFD700'; ctx.font = '20px Arial'; ctx.textAlign = 'center'; wrapText(ctx, tutorialText, canvas.width / 2, boxY + 45, boxW - 40, 30);
                ctx.fillStyle = '#32CD32'; ctx.fillRect(canvas.width / 2 - 80, boxY + boxH - 60, 160, 40); ctx.fillStyle = '#FFF'; ctx.font = 'bold 18px Arial'; ctx.fillText('點擊畫面繼續', canvas.width / 2, boxY + boxH - 34); ctx.textAlign = 'left'; 
            }
        }

        function loop(timestamp) { let rawDt = (timestamp - lastTime) / 1000; let dt = Math.max(0, Math.min(0.1, rawDt)); lastTime = timestamp; update(dt); draw(); requestAnimationFrame(loop); }
        requestAnimationFrame(loop);
        function pSBC(p, c0) { let r, g, b, P, i, f, Math_round = Math.round, d = c0.length>5?c0:null; if (!d) return null; P = p < 0; i = parseInt; f = d.slice(1); P = p < 0 ? p * -1 : p; P = 1 - P; r = i(f.slice(0, 2), 16); g = i(f.slice(2, 4), 16); b = i(f.slice(4, 6), 16); r = Math_round(r * P); g = Math_round(g * P); b = Math_round(b * P); return "#" + (0x1000000 + (r * 0x10000) + (g * 0x100) + b).toString(16).slice(1); }
    </script>
