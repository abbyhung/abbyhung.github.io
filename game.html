<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>伐木大亨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #7CFC00; /* 把背景改成草地綠，更有世界感 */
            touch-action: none; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 定義遊戲世界的總大小
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 1200;

        // 攝影機鏡頭
        let camera = { x: 0, y: 0 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let money = 0;
        let lastTime = performance.now();

        // 收銀台設定 (固定世界座標：左下角區域)
        const counter = {
            x: 200,
            y: 800,
            width: 240,
            height: 80,
            wood: 0,
            money: 0
        };

        // 升級區塊與集中區設定 (固定世界座標：右側區域)
        const forestStartX = 1200;
        const forestBottomY = 200 + (5 * 60); 

        const upgrades = {
            speed: { x: forestStartX, y: forestBottomY + 30, w: 140, h: 50, cost: 50, level: 1, cooldown: 0 },
            auto: { x: forestStartX + 150, y: forestBottomY + 30, w: 140, h: 50, cost: 100, count: 0, maxCount: 5, cooldown: 0 },
            transporter: { x: forestStartX, y: forestBottomY + 90, w: 140, h: 50, costs: [50, 150, 750], count: 0, maxCount: 3, cooldown: 0 },
            cashier: { x: forestStartX + 150, y: forestBottomY + 90, w: 140, h: 50, cost: 200, bought: false, cooldown: 0 }
        };

        const autoWoodZone = {
            x: forestStartX + 75, y: forestBottomY + 160, w: 120, h: 80, wood: 0
        };

        // 人物狀態 (初始位置放在收銀台附近)
        const player = {
            x: counter.x + 120,
            y: counter.y - 100,
            radius: 15,
            speed: 250,
            wood: 0,
            targetX: counter.x + 120,
            targetY: counter.y - 100,
            chopTimer: 0,
            maxChopTime: 6.0 
        };
        let choppingTree = null; 

        // 自動實體設定
        const autoChoppers = [];
        const transporters = [];
        let cashierTimer = 0; 

        // 客人設定
        const customers = [];
        let customerSpawnTimer = 0;

        // 建立 5*5 森林 (固定世界座標：右上角區域)
        const trees = [];
        const treeSize = 40;
        const startY = 200;
        const spacing = 60;

        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 5; j++) {
                trees.push({
                    x: forestStartX + i * spacing,
                    y: startY + j * spacing,
                    size: treeSize,
                    isCut: false,
                    isTargeted: false, 
                    respawnTimer: 0
                });
            }
        }

        // 處理滑鼠與觸控 (需加上鏡頭偏移量轉為世界座標)
        function setTarget(e) {
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            if (clientX !== undefined && clientY !== undefined) {
                // 點擊的螢幕位置 + 鏡頭偏移量 = 實際的世界座標
                player.targetX = clientX + camera.x;
                player.targetY = clientY + camera.y;
            }
        }

        window.addEventListener('mousedown', setTarget);
        window.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) setTarget(e);
        });
        window.addEventListener('touchstart', setTarget, {passive: false});
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            setTarget(e);
        }, {passive: false});

        function update(dt) {
            // 1. 人物移動
            let dx = player.targetX - player.x;
            let dy = player.targetY - player.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 5) {
                player.x += (dx / dist) * player.speed * dt;
                player.y += (dy / dist) * player.speed * dt;
            }

            // 限制人物不能跑出世界邊界
            player.x = Math.max(player.radius, Math.min(player.x, WORLD_WIDTH - player.radius));
            player.y = Math.max(player.radius, Math.min(player.y, WORLD_HEIGHT - player.radius));

            // --- 更新攝影機位置 (讓人物保持在畫面中央) ---
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            
            // 限制攝影機不要超出世界邊界
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT - canvas.height));

            // 2. 玩家砍樹邏輯
            let isNearAnyTree = false;
            trees.forEach(tree => {
                if (!tree.isCut) {
                    let treeCX = tree.x + tree.size / 2;
                    let treeCY = tree.y + tree.size / 2;
                    let d = Math.sqrt(Math.pow(player.x - treeCX, 2) + Math.pow(player.y - treeCY, 2));
                    
                    if (d < player.radius + tree.size / 2 + 5) {
                        isNearAnyTree = true;
                        if (choppingTree !== tree) {
                            choppingTree = tree;
                            player.chopTimer = player.maxChopTime;
                        }
                    }
                } else {
                    tree.respawnTimer -= dt;
                    if (tree.respawnTimer <= 0) {
                        tree.isCut = false;
                        tree.isTargeted = false;
                    }
                }
            });

            if (isNearAnyTree && choppingTree && !choppingTree.isCut) {
                player.chopTimer -= dt;
                if (player.chopTimer <= 0) {
                    choppingTree.isCut = true;
                    choppingTree.respawnTimer = 30.0; 
                    player.wood += 3;
                    choppingTree = null;
                }
            } else {
                choppingTree = null; 
            }

            // 3. 自動小幫手邏輯
            autoChoppers.forEach(bot => {
                if (bot.state === 'idle') {
                    let target = null;
                    let minDist = Infinity;
                    trees.forEach(t => {
                        if (!t.isCut && !t.isTargeted) {
                            let d = Math.hypot(t.x + t.size/2 - bot.x, t.y + t.size/2 - bot.y);
                            if (d < minDist) { minDist = d; target = t; }
                        }
                    });
                    if (target) {
                        bot.targetTree = target;
                        target.isTargeted = true;
                        bot.state = 'moving_to_tree';
                    }
                } else if (bot.state === 'moving_to_tree') {
                    if (bot.targetTree.isCut) {
                        bot.state = 'idle'; 
                        return;
                    }
                    let tCX = bot.targetTree.x + bot.targetTree.size / 2;
                    let tCY = bot.targetTree.y + bot.targetTree.size / 2;
                    let bDist = Math.hypot(tCX - bot.x, tCY - bot.y);
                    
                    if (bDist < 10) {
                        bot.state = 'chopping';
                        bot.chopTimer = 6.0; 
                    } else {
                        bot.x += (tCX - bot.x) / bDist * bot.speed * dt;
                        bot.y += (tCY - bot.y) / bDist * bot.speed * dt;
                    }
                } else if (bot.state === 'chopping') {
                    bot.chopTimer -= dt;
                    if (bot.chopTimer <= 0) {
                        bot.targetTree.isCut = true;
                        bot.targetTree.isTargeted = false;
                        bot.targetTree.respawnTimer = 30.0;
                        bot.wood += 3;
                        bot.targetTree = null;
                        bot.state = 'moving_to_zone';
                    }
                } else if (bot.state === 'moving_to_zone') {
                    let zCX = autoWoodZone.x + autoWoodZone.w / 2;
                    let zCY = autoWoodZone.y + autoWoodZone.h / 2;
                    let zDist = Math.hypot(zCX - bot.x, zCY - bot.y);
                    
                    if (zDist < 5) {
                        autoWoodZone.wood += bot.wood;
                        bot.wood = 0;
                        bot.state = 'idle';
                    } else {
                        bot.x += (zCX - bot.x) / zDist * bot.speed * dt;
                        bot.y += (zCY - bot.y) / zDist * bot.speed * dt;
                    }
                }
            });

            // 3.5 自動運送員邏輯
            transporters.forEach(t => {
                if (t.state === 'idle') {
                    if (autoWoodZone.wood > 0) t.state = 'moving_to_zone';
                } else if (t.state === 'moving_to_zone') {
                    let zCX = autoWoodZone.x + autoWoodZone.w / 2;
                    let zCY = autoWoodZone.y + autoWoodZone.h / 2;
                    let dist = Math.hypot(zCX - t.x, zCY - t.y);
                    
                    if (dist < 5) {
                        let take = Math.min(autoWoodZone.wood, 5 - t.wood);
                        autoWoodZone.wood -= take;
                        t.wood += take;
                        if (t.wood > 0) t.state = 'moving_to_counter';
                        else t.state = 'idle';
                    } else {
                        t.x += (zCX - t.x) / dist * t.speed * dt;
                        t.y += (zCY - t.y) / dist * t.speed * dt;
                    }
                } else if (t.state === 'moving_to_counter') {
                    let rightZoneCX = counter.x + (counter.width / 3) * 2.5;
                    let counterCY = counter.y + counter.height / 2;
                    let dist = Math.hypot(rightZoneCX - t.x, counterCY - t.y);

                    if (dist < 5) {
                        counter.wood += t.wood;
                        t.wood = 0;
                        t.state = 'idle';
                    } else {
                        t.x += (rightZoneCX - t.x) / dist * t.speed * dt;
                        t.y += (counterCY - t.y) / dist * t.speed * dt;
                    }
                }
            });

            // 4. 集中區玩家收集邏輯
            let distToAutoZone = Math.hypot(player.x - (autoWoodZone.x + autoWoodZone.w/2), player.y - (autoWoodZone.y + autoWoodZone.h/2));
            if (distToAutoZone < player.radius + autoWoodZone.w/2 + 10 && autoWoodZone.wood > 0) {
                player.wood += autoWoodZone.wood;
                autoWoodZone.wood = 0;
            }

            // 5. 升級區互動邏輯
            if (upgrades.speed.cooldown > 0) upgrades.speed.cooldown -= dt;
            if (upgrades.auto.cooldown > 0) upgrades.auto.cooldown -= dt;
            if (upgrades.transporter.cooldown > 0) upgrades.transporter.cooldown -= dt;
            if (upgrades.cashier.cooldown > 0) upgrades.cashier.cooldown -= dt;

            const inZone = (px, py, box) => {
                return Math.abs(px - (box.x + box.w/2)) < box.w/2 && Math.abs(py - (box.y + box.h/2)) < box.h/2;
            };

            if (inZone(player.x, player.y, upgrades.speed) && upgrades.speed.cooldown <= 0 && money >= upgrades.speed.cost && player.maxChopTime > 1) {
                money -= upgrades.speed.cost;
                player.maxChopTime -= 1;
                upgrades.speed.level += 1;
                upgrades.speed.cost = Math.floor(upgrades.speed.cost * 1.5); 
                upgrades.speed.cooldown = 1.0;
            }

            if (inZone(player.x, player.y, upgrades.auto) && upgrades.auto.cooldown <= 0 && money >= upgrades.auto.cost && upgrades.auto.count < upgrades.auto.maxCount) {
                money -= upgrades.auto.cost;
                upgrades.auto.count += 1;
                upgrades.auto.cost = Math.floor(upgrades.auto.cost * 1.5);
                upgrades.auto.cooldown = 1.0;
                
                autoChoppers.push({
                    x: upgrades.auto.x + upgrades.auto.w / 2,
                    y: upgrades.auto.y - 20,
                    speed: 180,
                    wood: 0,
                    state: 'idle',
                    targetTree: null,
                    chopTimer: 0
                });
            }

            if (inZone(player.x, player.y, upgrades.transporter) && upgrades.transporter.cooldown <= 0 && upgrades.transporter.count < upgrades.transporter.maxCount) {
                let currentCost = upgrades.transporter.costs[upgrades.transporter.count];
                if (money >= currentCost) {
                    money -= currentCost;
                    upgrades.transporter.count += 1;
                    upgrades.transporter.cooldown = 1.0;
                    
                    transporters.push({
                        x: autoWoodZone.x + autoWoodZone.w / 2,
                        y: autoWoodZone.y + autoWoodZone.h / 2,
                        speed: 200,
                        wood: 0,
                        state: 'idle'
                    });
                }
            }

            if (inZone(player.x, player.y, upgrades.cashier) && upgrades.cashier.cooldown <= 0 && !upgrades.cashier.bought && money >= upgrades.cashier.cost) {
                money -= upgrades.cashier.cost;
                upgrades.cashier.bought = true;
                upgrades.cashier.cooldown = 1.0;
            }

            // 6. 客人生成邏輯
            customerSpawnTimer -= dt;
            if (customerSpawnTimer <= 0) {
                if (customers.length < 10) {
                    customers.push({ need: Math.floor(Math.random() * 7) + 2 });
                }
                customerSpawnTimer = 2.0;
            }

            // 7. 收銀台與結帳邏輯
            const zoneWidth = counter.width / 3;
            const leftZoneCX = counter.x + zoneWidth / 2;
            const centerZoneCX = counter.x + zoneWidth * 1.5;
            const rightZoneCX = counter.x + zoneWidth * 2.5;
            const counterCY = counter.y + counter.height / 2;
            const interactRange = player.radius + zoneWidth / 2 + 10;

            if (Math.hypot(player.x - rightZoneCX, player.y - counterCY) < interactRange && player.wood > 0) {
                counter.wood += player.wood;
                player.wood = 0;
            }

            if (Math.hypot(player.x - centerZoneCX, player.y - counterCY) < interactRange && !upgrades.cashier.bought && counter.wood > 0 && customers.length > 0) {
                processTransaction();
            }

            if (upgrades.cashier.bought) {
                cashierTimer -= dt;
                if (cashierTimer <= 0) {
                    if (counter.wood > 0 && customers.length > 0) processTransaction();
                    cashierTimer = 0.5; 
                }
            }

            if (Math.hypot(player.x - leftZoneCX, player.y - counterCY) < interactRange && counter.money > 0) {
                money += counter.money;
                counter.money = 0;
            }
        }

        function processTransaction() {
            let currentCustomer = customers[0];
            let sellAmount = Math.min(counter.wood, currentCustomer.need);
            counter.wood -= sellAmount;
            currentCustomer.need -= sellAmount;
            counter.money += sellAmount * 2; 
            if (currentCustomer.need <= 0) customers.shift();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ==========================================
            // 開始繪製遊戲世界 (套用攝影機偏移)
            // ==========================================
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 畫個簡單的地板網格(可選)，增加走動時的相對速度感
            ctx.strokeStyle = '#6B8E23';
            ctx.lineWidth = 1;
            for(let i=0; i<WORLD_WIDTH; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_HEIGHT); ctx.stroke();
            }
            for(let i=0; i<WORLD_HEIGHT; i+=100) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_WIDTH, i); ctx.stroke();
            }

            // === 繪製收銀台 ===
            const zoneWidth = counter.width / 3;
            ctx.fillStyle = '#FFD700'; ctx.fillRect(counter.x, counter.y, zoneWidth, counter.height);
            ctx.fillStyle = '#333'; ctx.font = '16px Arial';
            ctx.fillText('領錢區', counter.x + 15, counter.y + 30);
            ctx.fillText(`$ ${counter.money}`, counter.x + 15, counter.y + 60);

            ctx.fillStyle = '#8B4513'; ctx.fillRect(counter.x + zoneWidth, counter.y, zoneWidth, counter.height);
            ctx.fillStyle = '#FFF'; ctx.fillText('結帳區', counter.x + zoneWidth + 15, counter.y + 45);

            if (upgrades.cashier.bought) {
                ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(counter.x + zoneWidth * 1.5, counter.y + 20, 10, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FFF'; ctx.font = '12px Arial'; ctx.fillText('收銀員', counter.x + zoneWidth + 22, counter.y + 70);
            }

            ctx.fillStyle = '#DEB887'; ctx.fillRect(counter.x + zoneWidth * 2, counter.y, zoneWidth, counter.height);
            ctx.fillStyle = '#333'; ctx.font = '16px Arial';
            ctx.fillText('放木區', counter.x + zoneWidth * 2 + 15, counter.y + 30);
            ctx.fillText(`木:${counter.wood}`, counter.x + zoneWidth * 2 + 15, counter.y + 60);
            
            // === 繪製排隊的客人 ===
            customers.forEach((c, index) => {
                if (index > 4) return; 
                let cx = counter.x + zoneWidth * 1.5 + (index * 45); 
                let cy = counter.y + counter.height + 30; 
                ctx.fillStyle = '#FF6347'; ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#333'; ctx.font = '14px Arial'; ctx.fillText(`需:${c.need}`, cx - 15, cy + 5);
            });
            if (customers.length > 5) {
                ctx.fillText(`+${customers.length - 5} 人排隊中 (滿客10人)`, counter.x + zoneWidth * 1.5 + (5 * 45), counter.y + counter.height + 35);
            }

            // === 繪製升級區 ===
            ctx.font = '14px Arial';
            
            ctx.fillStyle = player.maxChopTime > 1 ? '#ADD8E6' : '#D3D3D3'; ctx.fillRect(upgrades.speed.x, upgrades.speed.y, upgrades.speed.w, upgrades.speed.h);
            ctx.fillStyle = '#333'; ctx.fillText(player.maxChopTime > 1 ? `升級效率 (-1s)` : `砍樹已滿等`, upgrades.speed.x + 10, upgrades.speed.y + 20);
            if (player.maxChopTime > 1) ctx.fillText(`$${upgrades.speed.cost} (Lv.${upgrades.speed.level})`, upgrades.speed.x + 10, upgrades.speed.y + 40);

            ctx.fillStyle = upgrades.auto.count < upgrades.auto.maxCount ? '#FFB6C1' : '#D3D3D3'; ctx.fillRect(upgrades.auto.x, upgrades.auto.y, upgrades.auto.w, upgrades.auto.h);
            ctx.fillStyle = '#333'; ctx.fillText(upgrades.auto.count < upgrades.auto.maxCount ? `砍樹幫手` : `砍樹幫手滿編`, upgrades.auto.x + 10, upgrades.auto.y + 20);
            if (upgrades.auto.count < upgrades.auto.maxCount) ctx.fillText(`$${upgrades.auto.cost} (${upgrades.auto.count}/5)`, upgrades.auto.x + 10, upgrades.auto.y + 40);

            ctx.fillStyle = upgrades.transporter.count < upgrades.transporter.maxCount ? '#FFDAB9' : '#D3D3D3'; ctx.fillRect(upgrades.transporter.x, upgrades.transporter.y, upgrades.transporter.w, upgrades.transporter.h);
            ctx.fillStyle = '#333'; ctx.fillText(upgrades.transporter.count < upgrades.transporter.maxCount ? `購買運送員` : `運送員滿編`, upgrades.transporter.x + 10, upgrades.transporter.y + 20);
            if (upgrades.transporter.count < upgrades.transporter.maxCount) {
                ctx.fillText(`$${upgrades.transporter.costs[upgrades.transporter.count]} (${upgrades.transporter.count}/3)`, upgrades.transporter.x + 10, upgrades.transporter.y + 40);
            }

            ctx.fillStyle = !upgrades.cashier.bought ? '#98FB98' : '#D3D3D3'; ctx.fillRect(upgrades.cashier.x, upgrades.cashier.y, upgrades.cashier.w, upgrades.cashier.h);
            ctx.fillStyle = '#333'; ctx.fillText(!upgrades.cashier.bought ? `自動收銀員` : `已配置收銀員`, upgrades.cashier.x + 10, upgrades.cashier.y + 20);
            if (!upgrades.cashier.bought) ctx.fillText(`$${upgrades.cashier.cost}`, upgrades.cashier.x + 10, upgrades.cashier.y + 40);

            // === 繪製集中區 ===
            ctx.fillStyle = '#EEE8AA'; ctx.fillRect(autoWoodZone.x, autoWoodZone.y, autoWoodZone.w, autoWoodZone.h);
            ctx.fillStyle = '#333'; ctx.font = '16px Arial';
            ctx.fillText(`集中區`, autoWoodZone.x + 35, autoWoodZone.y + 35);
            ctx.fillText(`儲存量: ${autoWoodZone.wood}`, autoWoodZone.x + 20, autoWoodZone.y + 60);

            // === 繪製森林 ===
            trees.forEach(tree => {
                if (tree.isCut) {
                    ctx.fillStyle = '#DEB887'; ctx.fillRect(tree.x + 10, tree.y + 10, tree.size - 20, tree.size - 20);
                    ctx.fillStyle = '#888'; ctx.font = '12px Arial'; ctx.fillText(`${Math.ceil(tree.respawnTimer)}s`, tree.x + 10, tree.y);
                } else {
                    ctx.fillStyle = '#228B22'; ctx.fillRect(tree.x, tree.y, tree.size, tree.size);
                }
            });

            // === 繪製自動幫手與運送員 ===
            autoChoppers.forEach(bot => {
                ctx.fillStyle = '#8A2BE2'; ctx.beginPath(); ctx.arc(bot.x, bot.y, 12, 0, Math.PI * 2); ctx.fill();
                if (bot.state === 'chopping') {
                    let progress = 1 - (bot.chopTimer / 6.0);
                    ctx.fillStyle = 'red'; ctx.fillRect(bot.x - 15, bot.y - 20, 30, 4);
                    ctx.fillStyle = '#32CD32'; ctx.fillRect(bot.x - 15, bot.y - 20, 30 * progress, 4);
                }
                ctx.fillStyle = '#5C3A21'; let dots = Math.min(bot.wood, 5); 
                for (let i = 0; i < dots; i++) {
                    let angle = i * (Math.PI * 2 / Math.max(dots, 1));
                    ctx.beginPath(); ctx.arc(bot.x + Math.cos(angle) * 6, bot.y + Math.sin(angle) * 6, 3, 0, Math.PI * 2); ctx.fill();
                }
            });

            transporters.forEach(t => {
                ctx.fillStyle = '#FF8C00'; ctx.beginPath(); ctx.arc(t.x, t.y, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#5C3A21'; let dots = Math.min(t.wood, 5); 
                for (let i = 0; i < dots; i++) {
                    let angle = i * (Math.PI * 2 / Math.max(dots, 1));
                    ctx.beginPath(); ctx.arc(t.x + Math.cos(angle) * 6, t.y + Math.sin(angle) * 6, 3, 0, Math.PI * 2); ctx.fill();
                }
            });

            // === 繪製人物 ===
            ctx.fillStyle = '#4169E1'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#5C3A21'; let dots = Math.min(player.wood, 10); 
            for (let i = 0; i < dots; i++) {
                let angle = i * (Math.PI * 2 / Math.max(dots, 1));
                ctx.beginPath(); ctx.arc(player.x + Math.cos(angle) * 8, player.y + Math.sin(angle) * 8, 4, 0, Math.PI * 2); ctx.fill();
            }

            if (choppingTree && !choppingTree.isCut) {
                let progress = 1 - (player.chopTimer / player.maxChopTime);
                ctx.fillStyle = 'red'; ctx.fillRect(player.x - 20, player.y - 30, 40, 6);
                ctx.fillStyle = '#32CD32'; ctx.fillRect(player.x - 20, player.y - 30, 40 * progress, 6);
            }
            
            // 解除攝影機偏移 (接下來畫的會固定在螢幕上，不會隨人物移動)
            ctx.restore();

            // ==========================================
            // 繪製 UI 資訊 (固定在左上角)
            // ==========================================
            // 畫個半透明黑色底框讓文字更清楚
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 220, 100);

            ctx.fillStyle = '#FFF';
            ctx.font = '24px Arial';
            ctx.fillText(`總資產: $${money}`, 20, 45);
            ctx.fillText(`身上木頭: ${player.wood} 根`, 20, 85);
        }

        function loop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; 
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
