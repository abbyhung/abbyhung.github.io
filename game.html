<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>伐木大亨 - 產業鏈平衡版</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #C7EDCC; 
            touch-action: none; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WORLD_WIDTH = 2600; const WORLD_HEIGHT = 1600;
        let camera = { x: 0, y: 0 };
        
        const joystick = { x: 0, y: 0, radius: 60, knobX: 0, knobY: 0, active: false, angle: 0, pull: 0, touchId: null };
        const uiOkBtn = { x: 0, y: 0, w: 200, h: 60, active: false, target: null };
        const clearSaveBtn = { x: 0, y: 20, w: 100, h: 40 }; 
        
        const keys = { up: false, down: false, left: false, right: false };

        let firstInteractionTime = null;
        let lastInteractionTime = null;
        let saveTimer = 3.0; 

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            joystick.x = canvas.width - 100; 
            joystick.y = canvas.height - 100; 
            uiOkBtn.x = canvas.width / 2 - uiOkBtn.w / 2; 
            uiOkBtn.y = canvas.height - 120; 
            clearSaveBtn.x = canvas.width - 120; 
        }
        window.addEventListener('resize', resize); resize();

        let money = 0; let lastTime = performance.now();
        const counterLog = { x: 200, y: 1100, width: 240, height: 80, wood: 0, money: 0 };
        const counterLumber = { x: 200, y: 500, width: 240, height: 80, lumber: 0, money: 0 };
        
        const forestStartX = 1800; const startY = 200; const spacing = 60;
        let forestCols = 5; let forestRows = 5;
        
        // 【平衡調整】：將集中區移至森林旁邊，大幅縮短砍樹幫手的折返時間
        const autoWoodZone = { x: 1600, y: 200, w: 120, h: 80, wood: 0 };
        const machines = [];
        const player = { x: counterLog.x + 120, y: counterLog.y - 100, radius: 15, speed: 300, wood: 0, lumber: 0, chopTimer: 0, maxChopTime: 6.0, vx: 0, vy: 0 };
        let choppingTree = null; const autoChoppers = []; const transA = []; const transB = []; const transC = [];
        let cashierTimerLog = 0; let cashierTimerLumber = 0; const customersLog = []; const customersLumber = [];
        let spawnTimerLog = 0; let spawnTimerLumber = 0;
        const trees = [];
        const treeSize = 40; 

        const TREE_STAGES = [
            { radius: 0, trunkH: 10, color: '#DEB887', label: '樹樁' },        
            { radius: 10, trunkH: 15, color: '#9ACD32', label: '小小樹' },    
            { radius: 15, trunkH: 20, color: '#32CD32', label: '小樹' },      
            { radius: 20, trunkH: 25, color: '#228B22', label: '中小樹' },    
            { radius: 25, trunkH: 30, color: '#008000', label: '中樹' },      
            { radius: 30, trunkH: 35, color: '#006400', label: '中大樹' },    
            { radius: 35, trunkH: 40, color: '#004d00', label: '樹(可砍)' }   
        ];

        function buildForest(cols, rows, oldCols = 0, oldRows = 0) {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    if (i >= oldCols || j >= oldRows) {
                        trees.push({ x: forestStartX + i * spacing, y: startY + j * spacing, size: treeSize, isCut: false, isTargeted: false, respawnTimer: 0, currentStage: 6 });
                    }
                }
            }
        }

        function updateUIPositions() {
            let bottomY = startY + (forestRows * spacing);
            upgrades.speed.box.y = bottomY + 30;
            upgrades.auto.box.y = bottomY + 30;
            upgrades.expand.box.y = bottomY + 90;
        }

        const upgrades = {
            speed: { box: {x: forestStartX, y: 0, w: 140, h: 50}, title: '砍樹效率 (-1s)', costVal: 50, level: 1, cd: 0, req: function() { return player.maxChopTime > 1; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (Lv.${this.level})` : '已滿等'; }, action: function() { player.maxChopTime -= 1; this.level++; this.costVal = Math.floor(this.costVal * 1.5); } },
            // 【平衡調整】：提升幫手跑速至 250，讓砍樹更有效率
            auto: { box: {x: forestStartX + 150, y: 0, w: 140, h: 50}, title: '砍樹幫手', costVal: 100, count: 0, max: 5, cd: 0, req: function() { return this.count < this.max; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; this.costVal = Math.floor(this.costVal * 1.5); autoChoppers.push({x: this.box.x + 70, y: this.box.y - 20, speed: 250, wood: 0, state: 'idle'}); } },
            expand: { box: {x: forestStartX, y: 0, w: 290, h: 50}, title: '擴建森林', costVal: 500, level: 0, max: 5, cd: 0, req: function() { return this.level < this.max; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (${forestCols}x${forestRows})` : '已達極限'; }, action: function() { this.level++; this.costVal = Math.floor(this.costVal * 2.5); let oc = forestCols, or = forestRows; forestCols++; forestRows++; buildForest(forestCols, forestRows, oc, or); updateUIPositions(); } },
            // 【UI調整】：將物流升級按鈕移至新的集中區下方
            transA: { box: {x: 1600, y: 320, w: 140, h: 50}, title: '運送員A (赴原木站)', costs: [50, 150, 750], count: 0, max: 3, cd: 0, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transA.push({x: autoWoodZone.x + 60, y: autoWoodZone.y + 40, speed: 250, wood: 0, state: 'idle'}); } },
            transB: { box: {x: 1600, y: 380, w: 140, h: 50}, title: '運送員B (赴加工廠)', costs: [50, 150, 750], count: 0, max: 3, cd: 0, hidden: function() { return upgrades.machineBuy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transB.push({x: autoWoodZone.x + 60, y: autoWoodZone.y + 40, speed: 250, wood: 0, state: 'idle'}); } },
            
            cashierLog: { box: {x: counterLog.x + 300, y: counterLog.y + 15, w: 140, h: 50}, title: '自動收銀 (原木)', costVal: 200, bought: false, cd: 0, req: function() { return !this.bought; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal}` : '已配置'; }, action: function() { this.bought = true; } },
            machineBuy: { box: {x: 800, y: 350, w: 160, h: 50}, title: '購買加工廠', costs: [300, 600, 1200], count: 0, max: 3, cd: 0, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { machines.push({x: 800, y: 450 + this.count * 150, w: 100, h: 60, inputWood: 0, outputLumber: 0, timer: 0}); this.count++; } },
            machineSpeed: { box: {x: 1000, y: 350, w: 160, h: 50}, title: '加工效率 (-1s)', costVal: 200, level: 1, maxTime: 6.0, cd: 0, hidden: function() { return upgrades.machineBuy.count === 0; }, req: function() { return this.level < 5; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal} (Lv.${this.level})` : '滿等'; }, action: function() { this.level++; this.maxTime -= 1.0; this.costVal *= 2; } },
            transC: { box: {x: 600, y: 450, w: 140, h: 50}, title: '運送員C (赴木材區)', costs: [50, 150, 750], count: 0, max: 3, cd: 0, hidden: function() { return upgrades.machineBuy.count === 0; }, req: function() { return this.count < this.max; }, cost: function() { return this.costs[this.count]; }, desc: function() { return this.req() ? `$${this.cost()} (${this.count}/${this.max})` : '已滿編'; }, action: function() { this.count++; transC.push({x: counterLumber.x + 100, y: counterLumber.y + 40, speed: 250, lumber: 0, state: 'idle'}); } },
            cashierLumber: { box: {x: counterLumber.x + 300, y: counterLumber.y + 15, w: 140, h: 50}, title: '自動收銀 (木材)', costVal: 200, bought: false, cd: 0, hidden: function() { return upgrades.machineBuy.count === 0; }, req: function() { return !this.bought; }, cost: function() { return this.costVal; }, desc: function() { return this.req() ? `$${this.costVal}` : '已配置'; }, action: function() { this.bought = true; } }
        };

        function saveGame() {
            const data = {
                money: money,
                player: { wood: player.wood, lumber: player.lumber, maxChopTime: player.maxChopTime, x: player.x, y: player.y },
                counterLog: { wood: counterLog.wood, money: counterLog.money },
                counterLumber: { lumber: counterLumber.lumber, money: counterLumber.money },
                autoWoodZone: { wood: autoWoodZone.wood },
                forestCols: forestCols, forestRows: forestRows,
                trees: trees.map(t => ({ isCut: t.isCut, respawnTimer: t.respawnTimer, currentStage: t.currentStage })),
                upgrades: {
                    speed: { level: upgrades.speed.level, costVal: upgrades.speed.costVal },
                    auto: { count: upgrades.auto.count, costVal: upgrades.auto.costVal },
                    expand: { level: upgrades.expand.level, costVal: upgrades.expand.costVal },
                    transA: { count: upgrades.transA.count }, transB: { count: upgrades.transB.count }, transC: { count: upgrades.transC.count },
                    cashierLog: { bought: upgrades.cashierLog.bought },
                    machineBuy: { count: upgrades.machineBuy.count },
                    machineSpeed: { level: upgrades.machineSpeed.level, maxTime: upgrades.machineSpeed.maxTime, costVal: upgrades.machineSpeed.costVal },
                    cashierLumber: { bought: upgrades.cashierLumber.bought }
                },
                firstInteractionTime: firstInteractionTime,
                lastInteractionTime: lastInteractionTime
            };
            localStorage.setItem('lumberjack_save', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('lumberjack_save');
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                money = data.money || 0;
                player.wood = data.player.wood || 0; player.lumber = data.player.lumber || 0; player.maxChopTime = data.player.maxChopTime || 6.0;
                player.x = data.player.x || player.x; player.y = data.player.y || player.y;
                counterLog.wood = data.counterLog.wood || 0; counterLog.money = data.counterLog.money || 0;
                counterLumber.lumber = data.counterLumber.lumber || 0; counterLumber.money = data.counterLumber.money || 0;
                autoWoodZone.wood = data.autoWoodZone.wood || 0;
                forestCols = data.forestCols || 5; forestRows = data.forestRows || 5;
                firstInteractionTime = data.firstInteractionTime || null;
                lastInteractionTime = data.lastInteractionTime || null;
                let savedTreeData = data.trees || null; 
                
                let upg = data.upgrades;
                if (upg) {
                    upgrades.speed.level = upg.speed.level || 1; upgrades.speed.costVal = upg.speed.costVal || 50;
                    upgrades.auto.count = upg.auto.count || 0; upgrades.auto.costVal = upg.auto.costVal || 100;
                    upgrades.expand.level = upg.expand.level || 0; upgrades.expand.costVal = upg.expand.costVal || 500;
                    upgrades.transA.count = upg.transA.count || 0; upgrades.transB.count = upg.transB.count || 0; upgrades.transC.count = upg.transC.count || 0;
                    upgrades.cashierLog.bought = upg.cashierLog.bought || false;
                    upgrades.machineBuy.count = upg.machineBuy.count || 0;
                    upgrades.machineSpeed.level = upg.machineSpeed.level || 1; upgrades.machineSpeed.maxTime = upg.machineSpeed.maxTime || 6.0; upgrades.machineSpeed.costVal = upg.machineSpeed.costVal || 200;
                    upgrades.cashierLumber.bought = upg.cashierLumber.bought || false;
                }
                return { savedTreeData };
            } catch (e) {
                return false;
            }
        }

        let loadResult = loadGame();
        if (!loadResult) { forestCols = 5; forestRows = 5; }
        
        buildForest(forestCols, forestRows);
        
        if (loadResult && loadResult.savedTreeData) {
            let savedTreeData = loadResult.savedTreeData;
            let limit = Math.min(trees.length, savedTreeData.length);
            for (let i = 0; i < limit; i++) {
                trees[i].isCut = savedTreeData[i].isCut;
                trees[i].respawnTimer = savedTreeData[i].respawnTimer;
                trees[i].currentStage = savedTreeData[i].currentStage;
            }
        }
        
        updateUIPositions();
        
        for(let i=0; i<upgrades.auto.count; i++) autoChoppers.push({x: upgrades.auto.box.x + 70, y: upgrades.auto.box.y - 20, speed: 250, wood: 0, state: 'idle'});
        for(let i=0; i<upgrades.transA.count; i++) transA.push({x: autoWoodZone.x + 60, y: autoWoodZone.y + 40, speed: 250, wood: 0, state: 'idle'});
        for(let i=0; i<upgrades.transB.count; i++) transB.push({x: autoWoodZone.x + 60, y: autoWoodZone.y + 40, speed: 250, wood: 0, state: 'idle'});
        for(let i=0; i<upgrades.transC.count; i++) transC.push({x: counterLumber.x + 100, y: counterLumber.y + 40, speed: 250, lumber: 0, state: 'idle'});
        for(let i=0; i<upgrades.machineBuy.count; i++) machines.push({x: 800, y: 450 + i * 150, w: 100, h: 60, inputWood: 0, outputLumber: 0, timer: 0});

        function isInsideUI(x, y, ui) { return x >= ui.x && x <= ui.x + ui.w && y >= ui.y && y <= ui.y + ui.h; }
        function handlePurchaseClick() { if (uiOkBtn.active && uiOkBtn.target && money >= uiOkBtn.target.cost()) { money -= uiOkBtn.target.cost(); uiOkBtn.target.action(); uiOkBtn.target.cd = 1.0; uiOkBtn.active = false; uiOkBtn.target = null; saveGame(); return true; } return false; }
        
        function recordInteraction() {
            let now = Date.now();
            if (!firstInteractionTime) firstInteractionTime = now;
            lastInteractionTime = now;
        }

        window.addEventListener('keydown', (e) => {
            recordInteraction();
            if (['ArrowUp', 'w', 'W'].includes(e.key)) keys.up = true;
