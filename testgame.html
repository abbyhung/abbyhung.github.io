<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cute Runner Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #85c1e9; /* 高飽和度可愛藍色背景 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        #ui {
            position: absolute;
            top: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #34495e;
            pointer-events: none;
            width: 380px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span id="hpDisplay">HP: 50</span>
        <span id="scoreDisplay">距離: 0m</span>
    </div>
    <canvas id="gameCanvas" width="400" height="700"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hpDisplay = document.getElementById('hpDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // 遊戲狀態與變數
        let gameState = 'playing'; // playing, gameover
        let hp = 50;
        let score = 0;
        let frameCount = 0;

        // 跑道設定 (左: 100, 右: 300)
        const lanes = [100, 300];

        // 玩家物件
        const player = {
            lane: 0, // 0=左, 1=右
            x: lanes[0],
            y: 600,
            radius: 25,
            color: '#f1c40f', // 可愛亮黃色
            shootTimer: 0
        };

        const bullets = [];
        const enemies = [];
        const buffs = [];
        const particles = [];

        // 監聽滑鼠與觸控來切換跑道
        canvas.addEventListener('pointerdown', (e) => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            // 點擊左半邊去左跑道，右半邊去右跑道
            player.lane = clickX < canvas.width / 2 ? 0 : 1;
        });

        // 輔助函式：繪製圓形與陰影
        function drawCircle(x, y, radius, color, shadowColor) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.shadowColor = shadowColor || color;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0; // 重置陰影
        }

        // 產生粒子特效
        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    radius: Math.random() * 4 + 2,
                    color: color,
                    life: 1
                });
            }
        }

        // 遊戲主迴圈
        function gameLoop() {
            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText(`總推進距離: ${Math.floor(score)}m`, canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            // 清理畫面與背景捲動感 (這裡用簡單填色代替)
            ctx.fillStyle = '#85c1e9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫跑道分隔線
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // 重置

            // 玩家流暢移動 (Lerp 動畫)
            const targetX = lanes[player.lane];
            player.x += (targetX - player.x) * 0.2;

            // 繪製玩家
            drawCircle(player.x, player.y, player.radius, player.color, '#d4ac0d');

            // 玩家自動射擊
            player.shootTimer++;
            if (player.shootTimer > 15) { // 攻擊速度
                bullets.push({ x: player.x, y: player.y - 20, speed: 12, radius: 5 });
                player.shootTimer = 0;
            }

            // 更新與繪製子彈
            ctx.fillStyle = 'white';
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y -= b.speed;
                drawCircle(b.x, b.y, b.radius, 'white', 'white');
                if (b.y < 0) bullets.splice(i, 1);
            }

            // 生成怪物 (左側)
            if (frameCount % 60 === 0) { // 控制波次速度
                enemies.push({ x: lanes[0], y: -30, radius: 20, speed: 3, hp: 1, color: '#e74c3c' });
            }

            // 生成增益 (右側) - 控制低機率
            if (frameCount % 120 === 0 && Math.random() > 0.3) {
                buffs.push({ x: lanes[1], y: -30, radius: 18, speed: 3, color: '#2ecc71', type: 'heal' });
            }

            // 更新怪物與碰撞偵測
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                drawCircle(e.x, e.y, e.radius, e.color, '#c0392b');

                // 漏怪扣血判定
                if (e.y > canvas.height + e.radius) {
                    hp -= 1; // 漏掉一隻扣一滴血
                    updateUI();
                    enemies.splice(i, 1);
                    continue;
                }

                // 子彈打怪物
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let dist = Math.hypot(e.x - b.x, e.y - b.y);
                    if (dist < e.radius + b.radius) {
                        e.hp -= 1;
                        bullets.splice(j, 1);
                        if (e.hp <= 0) {
                            createParticles(e.x, e.y, e.color);
                            enemies.splice(i, 1);
                        }
                        break;
                    }
                }
            }

            // 更新增益與玩家拾取判定
            for (let i = buffs.length - 1; i >= 0; i--) {
                let b = buffs[i];
                b.y += b.speed;
                // 用正方形代表增益，增加視覺差異
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 15;
                ctx.fillRect(b.x - 15, b.y - 15, 30, 30);
                ctx.shadowBlur = 0;

                if (b.y > canvas.height + 20) {
                    buffs.splice(i, 1);
                    continue;
                }

                // 玩家吃到增益
                let dist = Math.hypot(b.x - player.x, b.y - player.y);
                if (dist < player.radius + 15) {
                    if (b.type === 'heal' && hp < 50) hp += 5; // 補血機制
                    createParticles(b.x, b.y, b.color);
                    updateUI();
                    buffs.splice(i, 1);
                }
            }

            // 更新與繪製粒子特效
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    drawCircle(p.x, p.y, p.radius, p.color, null);
                    ctx.globalAlpha = 1.0;
                }
            }

            // 更新遊戲狀態
            score += 0.1; // 推進距離
            frameCount++;
            updateUI();

            if (hp <= 0) {
                gameState = 'gameover';
            }

            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            hpDisplay.innerText = `HP: ${hp}`;
            scoreDisplay.innerText = `距離: ${Math.floor(score)}m`;
            if (hp <= 10) hpDisplay.style.color = '#e74c3c'; // 低血量警告色
            else hpDisplay.style.color = 'white';
        }

        // 啟動遊戲
        gameLoop();
    </script>
</body>
</html>
